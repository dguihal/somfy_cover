# Minimal ESPHome config to compile-test the somfy RTS cover (TX only, no receiver).
esphome:
  name: test-somfy-basic

esp32:
  board: esp32dev

logger:

external_components:
  - source:
      type: local
      path: ../../components

remote_transmitter:
  id: transmitter
  pin: GPIO4
  carrier_duty_percent: 100%

somfy:
  - id: rts_hub
    type: rts
    remote_transmitter: transmitter

button:
  - platform: template
    id: prog_button
    name: "Prog Button"

cover:
  - platform: somfy
    type: rts
    name: "Test Cover"
    open_duration: 40s
    close_duration: 40s
    storage_key: TestKey
    remote_code: 0x123456
    prog_button: prog_button
    somfy_id: rts_hub
